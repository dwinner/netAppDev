<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>

    <style>
      body {
        font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto,
          segoe ui, Helvetica, Arial, sans-serif, apple color emoji,
          segoe ui emoji, segoe ui symbol;
        font-weight: 400;
        line-height: 22.4px;
        font-size: 16px;
      }
      p,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      ul,
      ol {
        font-size: 16px;
        font-weight: 400;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      code {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .quiz-content {
        padding: 2.4rem;
        word-break: break-word;
        max-width: 86rem;
        margin: 0 auto;
      }
      .quiz-container {
        margin: 0 auto;
        max-width: 84rem;
        padding: 0;
      }
      .question {
        margin-bottom: 5rem;
      }
      .question span {
        font-size: 24px;
        font-weight: 700;
      }
      .question-prompt {
        margin-top: 0.8rem;
        font-weight: 700;
      }
      .question-answer {
        margin-top: 1.6rem;
        padding-left: 0;
        box-sizing: border-box;
      }
      .question-answer label {
        max-width: 80rem;
        position: relative;
        cursor: pointer;
        display: flex;
        min-width: 18rem;
        border: solid #1c1d1f 2px;
      }
      .question-answer div {
        display: flex;
        align-items: center;
        padding: 0.5rem;
        width: 100%;
      }
      .question-answer div:hover {
        background-color: #f5f5f5;
      }
      .question-answer input {
        display: none;
      }
      .question-answer span {
        width: 1rem;
        height: 1rem;
        margin-right: 1.6rem;
        top: 0;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
        border: 0.2rem solid #1c1d1f;
        position: relative;
      }
      .selected {
        background: #1c1d1f;
        box-shadow: 0 0 0 0.4rem #fff inset;
      }
      .score {
              position: fixed;
            }
    </style>
  </head>

  <body onload="main()">
    <div id="score" class="score">
      <span>Score: N/A of N/A</span>
    </div>
    <div id="quiz-container" class="quiz-content"></div>

    <script>
      const quizData = {"pass_percent": 70, "questions": [{"_class": "assessment", "id": 49183264, "assessment_type": "multiple-choice", "prompt": {"question": "<p>What command is used to list networks in Docker?</p>", "relatedLectureIds": ["29894500"], "feedbacks": ["docker network ls is used to list all existing networks in Docker", "Almost right, but there is a syntax issue in this command.", "Docker uses another keyword to \"show\" or \"list\" elements.", "Almost right, but there is a syntax issue in this command."], "answers": ["<p><code>docker network ls</code></p>", "<p><code>docker network -ls</code></p>", "<p><code>docker network show</code> </p>", "<p><code>docker network --ls</code></p>"]}, "correct_response": ["a"], "section": "", "question_plain": "What command is used to list networks in Docker?", "related_lectures": [{"_class": "lecture", "id": 29894500, "title": "Prerequisites", "created": "2021-12-11T10:56:02Z", "is_published": true, "asset": {"_class": "asset", "id": 42269546, "asset_type": "Video", "title": "Prerequisites.mp4", "created": "2022-07-03T15:52:43Z"}, "object_index": 7, "url": "/course/net-microservices-cqrs-event-sourcing-with-kafka/learn/lecture/29894500"}]}, {"_class": "assessment", "id": 49209052, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which dotnet CLI&nbsp;command is used to restore dependencies, such as NuGet packages, of a .NET&nbsp;project?</p>", "relatedLectureIds": ["33005936"], "feedbacks": ["dotnet build is used to build the project and not just to restore the NuGet packages.", "The dotnet restore command restores the dependencies and tools of a project.", "dotnet clean is used to clean a .NET project's bin folder.", "The dotnet restore command restores the dependencies and tools of a project."], "answers": ["<p><code>dotnet build</code> </p>", "<p><code>dotnet restore</code> </p>", "<p><code>dotnet clean</code> </p>", "<p><code>dotnet restore -nuget</code> </p>"]}, "correct_response": ["b"], "section": "", "question_plain": "Which dotnet CLI&nbsp;command is used to restore dependencies, such as NuGet packages, of a .NET&nbsp;project?", "related_lectures": [{"_class": "lecture", "id": 33005936, "title": "Adding NuGet Packages", "created": "2022-07-09T10:44:51Z", "is_published": true, "asset": {"_class": "asset", "id": 42387006, "asset_type": "Video", "title": "AddingNuGetPackages.mp4", "created": "2022-07-09T19:50:34Z"}, "object_index": 13, "url": "/course/net-microservices-cqrs-event-sourcing-with-kafka/learn/lecture/33005936"}]}, {"_class": "assessment", "id": 49209080, "assessment_type": "multiple-choice", "prompt": {"question": "<p>How do you tell docker to deploy containers using a docker-compose.yml file?</p>", "relatedLectureIds": ["29894536"], "feedbacks": ["The docker run command is used to run a single docker container from the terminal.", "The docker ps command is used to show all running containers.", "The docker stack deploy command does use a docker-compose.yml file, but it is used to deploy a new stack or update an existing stack for services running in Docker swarm.", "The docker-compose up command is used to deploy docker containers using a docker-compose.yml file"], "answers": ["<p><code>docker run</code> </p>", "<p><code>docker ps</code> </p>", "<p><code>docker stack deploy</code> </p>", "<p><code>docker-compose up</code> </p>"]}, "correct_response": ["d"], "section": "", "question_plain": "How do you tell docker to deploy containers using a docker-compose.yml file?", "related_lectures": [{"_class": "lecture", "id": 29894536, "title": "Run MongoDB in Docker", "created": "2021-12-11T10:57:03Z", "is_published": true, "asset": {"_class": "asset", "id": 41996240, "asset_type": "Video", "title": "RunMongoDbInDocker.mp4", "created": "2022-06-19T14:16:51Z"}, "object_index": 9, "url": "/course/net-microservices-cqrs-event-sourcing-with-kafka/learn/lecture/29894536"}]}]};
      var correct = 0;
      var total = 0;
      const questionData = quizData.questions
      const passPercent = quizData.pass_percent

      function main() {
        total = questionData.length;

        var questions = [];
        for (var i = 0; i < questionData.length; i++) {
          var question = questionData[i];
          var questionText = question.prompt.question;
          var answers = question.prompt.answers;
          var correctAnswer = question.correct_response[0];
          var correctAnswerText = answers[correctAnswer.charCodeAt(0) - 97];
          var questionObj = {
            question: questionText,
            correctAnswer: correctAnswerText,
            answers: answers,
            id: question.id,
          };
          questions.push(questionObj);
        }

        updateScore();

        // display the questions
        var questionsContainer = document.getElementById("quiz-container");
        for (var i = 0; i < questions.length; i++) {
          var question = questions[i];
          var questionElement = document.createElement("form");
          questionElement.className = "question";
          questionElement.innerHTML =
            "<span>Question " +
            (i + 1) +
            ":</span>" +
            '<div class="question-prompt">' +
            question.question +
            "</div>";
          questionElement.id = question.id;
          questionElement.classList.add("quiz-container");
          var answersElement = document.createElement("ul");
          answersElement.className = "answers";
          for (var j = 0; j < question.answers.length; j++) {
            var answer = question.answers[j];
            var answerElement = document.createElement("li");
            answerElement.className = "answer";
            answerElement.innerHTML =
              '<label for="input-' +
              question.id +
              "-" +
              j +
              '"><div onclick="select(' +
              question.id +
              ", " +
              j +
              ')"><span></span><input id="input-' +
              question.id +
              "-" +
              j +
              '" type="radio" name="question' +
              i +
              '" value="' +
              j +
              '">' +
              answer +
              "</input></div></label>";
            answerElement.classList.add("question-answer");
            answersElement.appendChild(answerElement);
          }

          questionElement.appendChild(answersElement);

          // add a submit button
          var submitButton = document.createElement("button");
          submitButton.className = "submit";
          submitButton.innerHTML = "Submit";
          submitButton.classList.add("submit-button");

          submitButton.addEventListener("click", function (e) {
            e.preventDefault();
            var questionElement = e.target.parentElement;
            var questionId = questionElement.id;
            var question = questions.filter(function (q) {
              return q.id == questionId;
            })[0];

            // set the border color of all answers to black
            var answers = questionElement.getElementsByClassName("answer");
            for (var i = 0; i < answers.length; i++) {
              console.log(answers[i]);
              answers[i].children[0].style.borderColor = "#1c1d1f";
            }

            var answer = questionElement.querySelector(
              'input[type="radio"]:checked'
            );
            if (answer) {
              var answerIndex = answer.value;
              var answerText = question.answers[answerIndex];
              if (answerText == question.correctAnswer) {
                answer.parentElement.parentElement.style.borderColor =
                  "limegreen";
                // alert("Correct!");
                correct++;
                updateScore();
              } else {
                answer.parentElement.parentElement.style.borderColor = "red";
                // alert("Incorrect!");
              }
            } else {
              alert("Please select an answer.");
            }
          });

          // add button
          questionElement.appendChild(submitButton);

          questionsContainer.appendChild(questionElement);
        }
      }

      function select(question, answer) {
        var questionElement = document.getElementById(question);
        var answers = questionElement.getElementsByClassName("answer");
        for (var i = 0; i < answers.length; i++) {
          var span = answers[i].children[0].children[0].children[0];
          var input = answers[i].children[0].children[0].children[1];
          span.classList.remove("selected");
          input.checked = false;
        }
        var span = answers[answer].children[0].children[0].children[0];
        var input = answers[answer].children[0].children[0].children[1];
        span.classList.add("selected");
        input.checked = true;
      }

      function updateScore() {
        var scoreElem = document.getElementById("score");
        const score = (correct / total) * 100;
        scoreElem.innerHTML = "Score: " + score + "/" + passPercent + "%";
      }
    </script>
  </body>
</html>
